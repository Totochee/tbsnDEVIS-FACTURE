<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TBSN — Devis & Factures</title>
<link rel="icon" href="favicondevis2.png" type="image/png">
<meta name="theme-color" content="#0A1A33">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* Charte TBSN groupe */
  --navy:#0A1A33; --navy-2:#16305A; --ink:#111826; --muted:#5B6678;
  --line:#E7E9EF; --line-2:#F1F2F6; --bg:#FFFFFF; --paper:#F6F7F9;
  --orange:#FF5A1F; --orange-ink:#E94E15; --orange-soft:#FFEEE7;
  --ok:#0E7A5A; --ok-soft:#E2F3EC; --warn:#B4531A; --warn-soft:#FBEADD;
  --danger:#C0392B; --danger-soft:#FBE9E7;
  /* couleurs métier (identiques au site) */
  --c-logo:#1D4ED8; --c-print:#0E7490; --c-video:#7E22CE;
  --c-photo:#A16207; --c-social:#BE185D; --c-drone:#334155;
  --display:'Space Grotesk',ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
  --body:'Inter',ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  --r:14px; --r-lg:16px;
  --shadow:0 1px 2px rgba(10,26,51,.05),0 10px 30px rgba(10,26,51,.06);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--body);color:var(--ink);background:var(--paper);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:var(--body);font-size:14px}
a{color:var(--orange)}
::selection{background:var(--orange);color:#fff}
.tnum{font-family:var(--display);font-variant-numeric:tabular-nums;letter-spacing:.01em}

/* ---------- Layout ---------- */
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.rail{background:var(--navy);color:#9FB0C9;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.brand{padding:24px 22px 18px}
.brand .wm{font-family:var(--display);font-weight:700;font-size:1.28rem;letter-spacing:.02em;color:#fff;line-height:1}
.brand .wm span{color:var(--orange)}
.brand .bs{font-size:10px;color:#5E7091;letter-spacing:.2em;text-transform:uppercase;margin-top:8px;font-weight:600}
.nav{padding:8px 12px;display:flex;flex-direction:column;gap:2px;flex:1}
.nav .lbl{font-family:var(--display);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#5E7091;padding:16px 10px 6px;font-weight:600}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:10px;color:#A9B7CC;text-decoration:none;font-weight:500;font-size:13.5px;transition:.14s}
.nav a svg{width:17px;height:17px;flex:none;opacity:.9}
.nav a:hover{background:rgba(255,255,255,.06);color:#fff}
.nav a.active{background:var(--orange);color:#fff;box-shadow:0 6px 18px rgba(255,90,31,.32)}
.nav a.active svg{opacity:1}
.rail-foot{padding:14px 14px 18px;border-top:1px solid rgba(255,255,255,.09);display:flex;flex-direction:column;gap:8px}
.rail-foot .rf-btn{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.06);color:#C2CDDE;border:none;border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:500;width:100%;text-align:left;transition:.14s}
.rail-foot .rf-btn:hover{background:rgba(255,255,255,.12);color:#fff}
.rail-foot .rf-btn svg{width:15px;height:15px}

.main{min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:26px 34px 0;gap:16px}
.page-head h1{margin:0;font-family:var(--display);font-size:24px;font-weight:700;letter-spacing:-.02em;color:var(--navy)}
.page-head .eyebrow{font-family:var(--display);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:6px}
.content{padding:22px 34px 64px}

/* ---------- Boutons ---------- */
.btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--line);background:var(--bg);color:var(--navy);padding:10px 18px;border-radius:999px;font-family:var(--display);font-weight:600;font-size:13px;transition:.15s;white-space:nowrap}
.btn svg{width:15px;height:15px}
.btn:hover{border-color:var(--muted);background:var(--paper)}
.btn.primary{background:var(--orange);border-color:var(--orange);color:#fff}
.btn.primary:hover{background:var(--orange-ink);border-color:var(--orange-ink);transform:translateY(-1px);box-shadow:0 8px 22px rgba(255,90,31,.28)}
.btn.ghost{background:transparent;border-color:transparent}
.btn.ghost:hover{background:var(--line-2)}
.btn.sm{padding:7px 13px;font-size:12px}
.btn.danger{color:var(--danger);border-color:transparent}
.btn.danger:hover{background:var(--danger-soft);border-color:#EEC9C3}

/* ---------- Cartes / tables ---------- */
.card{background:var(--bg);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow)}
.grid{display:grid;gap:16px}
.stats{grid-template-columns:repeat(4,1fr)}
.stat{padding:20px}
.stat .k{font-family:var(--display);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
.stat .v{font-family:var(--display);font-size:27px;font-weight:700;letter-spacing:-.02em;margin-top:9px;color:var(--navy)}
.stat .v small{font-size:14px;color:var(--muted);font-weight:600}
.stat .sub{font-size:12px;color:var(--muted);margin-top:4px}

table{width:100%;border-collapse:collapse}
thead th{text-align:left;font-family:var(--display);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:13px 16px;border-bottom:1px solid var(--line)}
tbody td{padding:14px 16px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--paper)}
.t-right{text-align:right}
.doc-no{font-family:var(--display);font-weight:600;font-size:13px;color:var(--navy)}
.cell-strong{font-weight:600;color:var(--navy)}
.cell-sub{font-size:12px;color:var(--muted)}

.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:999px;font-family:var(--display);font-size:11.5px;font-weight:600;line-height:1.4}
.badge::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.b-grey{background:#EDEFF3;color:#697488}
.b-blue{background:#E6EDFD;color:#1D4ED8}
.b-green{background:var(--ok-soft);color:var(--ok)}
.b-amber{background:var(--warn-soft);color:var(--warn)}
.b-red{background:var(--danger-soft);color:var(--danger)}

.rowActions{display:flex;gap:3px;justify-content:flex-end;opacity:.55;transition:.14s}
tr:hover .rowActions{opacity:1}
.iconbtn{border:none;background:transparent;padding:7px;border-radius:9px;color:var(--muted);display:inline-flex}
.iconbtn:hover{background:var(--line-2);color:var(--navy)}
.iconbtn svg{width:16px;height:16px}
.iconbtn.danger:hover{background:var(--danger-soft);color:var(--danger)}

.empty{padding:60px 20px;text-align:center;color:var(--muted)}
.empty svg{width:36px;height:36px;opacity:.4;margin-bottom:12px;color:var(--navy)}
.empty h3{font-family:var(--display);color:var(--navy);margin:0 0 4px;font-size:15px}

.section-title{display:flex;align-items:center;justify-content:space-between;margin:28px 0 12px}
.section-title h2{font-family:var(--display);font-size:15px;font-weight:700;margin:0;letter-spacing:-.01em;color:var(--navy)}

/* ---------- Formulaires ---------- */
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.field label{font-family:var(--display);font-size:12px;font-weight:600;color:var(--navy)}
.field .hint{font-size:11.5px;color:var(--muted);font-weight:400;font-family:var(--body)}
input[type=text],input[type=email],input[type=number],input[type=date],input[type=tel],select,textarea{
  width:100%;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);transition:.14s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px var(--orange-soft)}
textarea{resize:vertical;min-height:70px;font-family:var(--body)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px}
.form-grid .full{grid-column:1/-1}

/* ---------- Editeur ---------- */
.editor{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:22px;align-items:start}
.panel{padding:22px}
.panel h3{font-family:var(--display);margin:0 0 14px;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
.lineTable{width:100%;border-collapse:collapse;margin-top:4px}
.lineTable th{font-family:var(--display);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);text-align:left;padding:4px 6px;font-weight:600}
.lineTable td{padding:3px 4px;vertical-align:top}
.lineTable input{padding:8px 9px;border-radius:9px}
.lineTable .lt-desc{width:100%}
.lineTable .lt-num input{text-align:right;font-family:var(--display);font-variant-numeric:tabular-nums}
.lineTable .lt-rm{width:30px}
.addline{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.totbox{margin-top:16px;border-top:1px dashed var(--line);padding-top:14px;display:flex;flex-direction:column;gap:8px}
.totrow{display:flex;justify-content:space-between;align-items:center;font-size:13px}
.totrow.big{font-family:var(--display);font-size:18px;font-weight:700;border-top:1px solid var(--line);padding-top:12px;margin-top:3px;color:var(--navy)}
.totrow .tnum{font-weight:600}

/* ---------- Feuille document ---------- */
.sheetwrap{position:sticky;top:22px}
.sheet{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);padding:44px 46px;font-size:12.5px;color:#23262E;font-family:var(--body)}
.sheet .doc-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-bottom:34px}
.sheet .logo{max-width:160px;max-height:66px;object-fit:contain}
.sheet .wordmark{font-family:var(--display);font-weight:700;font-size:20px;letter-spacing:.02em;color:var(--navy)}
.sheet .wordmark span{color:var(--orange)}
.sheet .co-tag{color:var(--muted);font-size:11.5px;margin-top:3px}
.sheet .co-lines{margin-top:10px;font-size:11.5px;color:#48505F;line-height:1.65}
.sheet .doc-title{text-align:right}
.sheet .doc-title .dt{font-family:var(--display);font-size:27px;font-weight:700;letter-spacing:.01em;text-transform:uppercase;color:var(--navy)}
.sheet .doc-title .dn{font-family:var(--display);font-size:13px;color:var(--muted);margin-top:3px;font-variant-numeric:tabular-nums}
.sheet .meta{display:flex;justify-content:space-between;gap:24px;margin-bottom:26px}
.sheet .party{flex:1}
.sheet .party .plbl{font-family:var(--display);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--orange);font-weight:600;margin-bottom:6px}
.sheet .party .pname{font-family:var(--display);font-weight:600;font-size:13px;color:var(--navy)}
.sheet .party .plines{color:#48505F;line-height:1.65;font-size:11.5px;margin-top:3px}
.sheet .datebox{text-align:right;font-size:11.5px;color:#48505F}
.sheet .datebox b{color:var(--navy);font-family:var(--display);font-weight:600}
.sheet table.doc-items{width:100%;border-collapse:collapse}
.sheet table.doc-items th{background:var(--navy);color:#fff;font-family:var(--display);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:10px;text-align:left;font-weight:600}
.sheet table.doc-items th:first-child{border-radius:7px 0 0 0}
.sheet table.doc-items th:last-child{border-radius:0 7px 0 0}
.sheet table.doc-items th.r,.sheet table.doc-items td.r{text-align:right}
.sheet table.doc-items td{padding:11px 10px;border-bottom:1px solid var(--line-2);vertical-align:top}
.sheet table.doc-items .d-name{font-family:var(--display);font-weight:600;color:var(--navy)}
.sheet table.doc-items .d-desc{color:var(--muted);font-size:11px;margin-top:2px}
.sheet table.doc-items td.r{font-family:var(--display);font-variant-numeric:tabular-nums}
.sheet .sums{display:flex;justify-content:flex-end;margin-top:18px}
.sheet .sums .sbox{width:60%;max-width:290px}
.sheet .sums .srow{display:flex;justify-content:space-between;padding:6px 0;font-size:12px}
.sheet .sums .srow .tnum{font-family:var(--display);font-variant-numeric:tabular-nums}
.sheet .sums .stotal{display:flex;justify-content:space-between;margin-top:8px;padding:13px 14px;background:var(--orange-soft);border-radius:9px;font-family:var(--display);font-weight:700;font-size:16px;color:var(--orange-ink)}
.sheet .sums .stotal .tnum{font-variant-numeric:tabular-nums}
.sheet .tva-note{margin-top:16px;font-size:11px;color:#48505F;font-style:italic}
.sheet .legal{margin-top:26px;padding-top:16px;border-top:1px solid var(--line-2);font-size:10px;color:var(--muted);line-height:1.65}
.sheet .signbox{margin-top:24px;display:flex;justify-content:flex-end}
.sheet .signbox .sb{width:240px;border:1.5px dashed var(--line);border-radius:9px;padding:13px 15px;font-size:11px;color:var(--muted)}
.sheet .signbox .sb b{font-family:var(--display);color:var(--navy);display:block;margin-bottom:36px;font-size:11.5px}
.sheet .foot{margin-top:22px;text-align:center;font-size:10px;color:var(--muted);border-top:1px solid var(--line-2);padding-top:12px;font-family:var(--display);letter-spacing:.02em}
.sheet .notes{margin-top:16px;font-size:11.5px;color:#48505F;background:var(--paper);border:1px solid var(--line-2);border-radius:9px;padding:12px 14px}
.sheet .notes b{color:var(--navy);font-family:var(--display)}

/* ---------- Catalogue ---------- */
.catgroup{margin-bottom:14px;overflow:hidden}
.catgroup .ch{display:flex;align-items:center;gap:10px;padding:14px 16px;font-family:var(--display);font-weight:600;font-size:14px;color:var(--navy)}
.catgroup .ch .dot{width:11px;height:11px;border-radius:50%}
.catgroup .ch .cnt{font-size:11.5px;color:var(--muted);font-weight:500;font-family:var(--body)}

/* ---------- Modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(10,26,51,.48);backdrop-filter:blur(3px);display:none;align-items:flex-start;justify-content:center;padding:44px 16px;z-index:60;overflow:auto}
.overlay.show{display:flex}
.modal{background:var(--bg);border-radius:18px;box-shadow:0 30px 80px rgba(10,26,51,.32);width:100%;max-width:520px;animation:pop .16s ease}
.modal.wide{max-width:620px}
@keyframes pop{from{transform:translateY(10px);opacity:.5}to{transform:none;opacity:1}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--line)}
.modal-head h3{font-family:var(--display);margin:0;font-size:16px;font-weight:700;color:var(--navy)}
.modal-body{padding:22px 24px;max-height:66vh;overflow:auto}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;padding:16px 24px;border-top:1px solid var(--line);background:var(--paper);border-radius:0 0 18px 18px}

/* ---------- Toast ---------- */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:13px 20px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 14px 38px rgba(10,26,51,.34);opacity:0;pointer-events:none;transition:.24s;z-index:90;display:flex;align-items:center;gap:9px;font-family:var(--display)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast svg{width:16px;height:16px;color:#4ADE80}

.hstack{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.mb0{margin-bottom:0}.mt16{margin-top:16px}.spacer{flex:1}
select.status-inline{padding:5px 10px;font-size:12px;font-weight:600;border-radius:999px;width:auto}

/* ---------- Blocs de prestation (éditeur devis) ---------- */
.blocs{display:flex;flex-direction:column;gap:12px}
.bloc{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:#fff}
.bloc-head{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--paper);border-bottom:1px solid var(--line)}
.bloc-head .dot{width:11px;height:11px;border-radius:50%;flex:none}
.bloc-head .bn{font-family:var(--display);font-weight:600;color:var(--navy);flex:1;font-size:13.5px;line-height:1.2}
.bloc-head .bn small{display:block;font-family:var(--body);font-weight:400;color:var(--muted);font-size:11px;margin-top:1px}
.bloc-head .bprice{font-family:var(--display);font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums;white-space:nowrap}
.bloc-body{padding:12px 14px;display:flex;flex-direction:column;gap:2px}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 0}
.ctrl-row>label{font-weight:500;color:var(--ink);font-size:13px}
.ctrl-row select,.ctrl-row input{width:auto;min-width:120px;max-width:220px}
.ctrl-row .num{width:88px;min-width:0;text-align:right;font-family:var(--display);font-variant-numeric:tabular-nums}
.opt-list{display:flex;flex-direction:column;border-top:1px dashed var(--line);margin-top:8px;padding-top:6px}
.opt-item{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:8px 0;font-size:13px;cursor:pointer}
.opt-item .oc{display:flex;align-items:flex-start;gap:9px;line-height:1.35}
.opt-item input[type=checkbox]{width:17px;height:17px;accent-color:var(--orange);flex:none;margin-top:1px;cursor:pointer}
.opt-item .op{font-family:var(--display);font-weight:600;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap}
.opt-item.on .op{color:var(--navy)}
.opt-item.on{color:var(--navy)}
.svcpick{margin-top:12px}
.catbase{display:flex;align-items:center;gap:10px}
.catbase .num{width:110px}
.optedit{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--line-2)}
.optedit input.lbl{flex:1}
.optedit input.pr{width:96px;text-align:right;font-family:var(--display)}

/* ---------- Impression ---------- */
#print-root{position:fixed;left:-99999px;top:0}
@media print{
  html,body{background:#fff}
  body > *:not(#print-root){display:none !important}
  #print-root{position:static;left:auto}
  #print-root .sheet{border:none;box-shadow:none;border-radius:0;padding:0}
  .sheet, .sheet *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  .sheet table.doc-items{page-break-inside:auto}
  .sheet table.doc-items tr{page-break-inside:avoid}
  .sheet .sums,.sheet .signbox{page-break-inside:avoid}
  @page{size:A4 portrait;margin:15mm 14mm}
}

/* ---------- Responsive ---------- */
@media(max-width:1080px){ .editor{grid-template-columns:1fr} .sheetwrap{position:static} .stats{grid-template-columns:repeat(2,1fr)} }
@media(max-width:760px){
  .app{grid-template-columns:1fr}
  .rail{position:fixed;bottom:0;top:auto;left:0;right:0;height:62px;flex-direction:row;z-index:50}
  .brand,.rail-foot,.nav .lbl{display:none}
  .nav{flex-direction:row;padding:0;justify-content:space-around;width:100%}
  .nav a{flex-direction:column;gap:3px;font-size:9.5px;padding:8px 4px;border-radius:0;min-width:0;flex:1}
  .nav a span.navtext{font-size:9px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nav a[data-view="logout"] span.navtext{font-size:8.4px}
  .main{padding-bottom:74px}
  .topbar,.content{padding-left:16px;padding-right:16px}
  .form-grid{grid-template-columns:1fr}
  .stats{grid-template-columns:1fr}
  .sheet{padding:26px 22px}
}

/* ---------- Code d'entree ---------- */
.app.locked{display:none}
.access-gate{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#0A1A33 0%,#16305A 48%,#FF5A1F 100%)}
.access-card{width:min(100%,390px);background:#fff;border:1px solid rgba(255,255,255,.22);border-radius:16px;box-shadow:0 24px 70px rgba(10,26,51,.35);padding:28px;color:var(--ink)}
.access-brand{font-family:var(--display);font-weight:700;font-size:22px;color:var(--navy);letter-spacing:.02em;line-height:1}
.access-brand span{color:var(--orange)}
.access-card h2{font-family:var(--display);margin:22px 0 8px;font-size:20px;color:var(--navy);letter-spacing:0}
.access-card p{margin:0 0 18px;color:var(--muted);font-size:13px}
.access-card .field{margin-bottom:10px}
.access-card input{text-align:center;font-family:var(--display);font-size:19px;letter-spacing:.16em}
.access-card .btn{width:100%;justify-content:center;margin-top:8px}
.access-error{min-height:18px;margin-top:10px;color:var(--danger);font-size:12.5px;text-align:center;font-weight:600}

const eur = new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'});

const todayISO = ()=>new Date().toISOString().slice(0,10);

function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function nl2br(s){ return esc(s).replace(/\n/g,'<br>'); }
function wordmarkHTML(name){ return esc(name||'').replace(/(groupe\.?)/i,'<span style="color:var(--orange)">$1</span>'); }
function svcById(id){ return S.services.find(s=>s.id===id); }
function clientById(id){ return S.clients.find(c=>c.id===id); }

/* ---------- Calcul d'un document (fidèle au simulateur) ---------- */
function computeDoc(doc){
  const lines=[]; let oneShot=0, monthly=0, travel=0, nbServices=0;
  (doc.blocs||[]).forEach(b=>{
    const s=svcById(b.svcId); if(!s) return;
    nbServices++;
    let coef=1, selLabel='';
    if(s.select){ const i=Math.min(s.select.opts.length-1,Math.max(0,b.sel||0)); coef=s.select.opts[i].coef; selLabel=s.select.opts[i].label; }
    let qty=1;
    if(s.qty){ qty=Math.min(s.qty.max,Math.max(s.qty.min,parseInt(b.qty)||s.qty.def)); }
    const baseUnit=Math.round(s.base*coef);
    const baseTotal=baseUnit*qty;
    lines.push({name:s.nom+(s.mensuel?' (mensuel)':''), description:selLabel,
      qty:qty, unit:(s.qty?('support'+(qty>1?'s':'')):(s.mensuel?'mois':'forfait')),
      price:baseUnit, total:baseTotal, color:s.couleur, kind:'base'});
    if(s.mensuel) monthly+=baseTotal; else oneShot+=baseTotal;
    (s.options||[]).forEach(o=>{
      if(b.opts && b.opts[o.id]){
        const q=o.parQty?qty:1, tot=o.prix*q;
        lines.push({name:o.label, description:'', qty:q, unit:o.parQty?('support'+(q>1?'s':'')):'', price:o.prix, total:tot, color:s.couleur, kind:'opt'});
        if(s.mensuel) monthly+=tot; else oneShot+=tot;
      }
    });
    if(s.km){
      const km=Math.min(2000,Math.max(0,parseInt(b.km)||0));
      if(km>0){ const rate=Number(S.settings.pricePerKm)||0, cost=Math.round(km*rate);
        lines.push({name:'Frais de déplacement', description:km+' km aller-retour × '+fmtRate(rate)+' /km', qty:1, unit:'', price:cost, total:cost, color:s.couleur, kind:'km'});
        travel+=cost;
      }
    }
  });
  (doc.extraLines||[]).forEach(l=>{
    const tot=(Number(l.qty)||0)*(Number(l.price)||0);
    lines.push({name:l.name||'—', description:l.description||'', qty:Number(l.qty)||0, unit:l.unit||'', price:Number(l.price)||0, total:tot, color:'#0A1A33', kind:'free'});
    oneShot+=tot;
  });
  let remisePct=0;
  if(doc.autoRemise!==false){ if(nbServices>=3) remisePct=0.10; else if(nbServices===2) remisePct=0.05; }
  const remiseAuto=Math.round((oneShot+monthly)*remisePct);
  let manualRem=0;
  if(doc.discountType==='pct') manualRem=Math.round((oneShot+monthly)*((Number(doc.discount)||0)/100));
  else manualRem=Number(doc.discount)||0;
  const sub=oneShot+monthly;
  const rem=Math.min(sub, remiseAuto+manualRem);
  const total=Math.max(0, sub-rem+travel);
  return {lines, oneShot, monthly, travel, nbServices, remisePct, remiseAuto, manualRem, sub, rem, total};
}
function docTotals(doc){ const c=computeDoc(doc); return {sub:c.sub, rem:c.rem, total:c.total}; }

/* ---------- Toast ---------- */
let toastT;
function toast(msg){
  const t=document.getElementById('toast');
  t.innerHTML=I.check+'<span>'+esc(msg)+'</span>';
  t.classList.add('show'); clearTimeout(toastT);
  toastT=setTimeout(()=>t.classList.remove('show'),2200);
}

function openModal(html){ modalEl.innerHTML=html; overlay.classList.add('show'); }
function closeModal(){ overlay.classList.remove('show'); modalEl.innerHTML=''; }
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });

/* ---------- Navigation ---------- */
let VIEW='dashboard';
function buildNav(){
  document.querySelectorAll('#nav a').forEach(a=>{
    const v=a.dataset.view, d=NAV.find(n=>n.v===v);
    a.innerHTML=d.i+'<span class="navtext">'+d.t+'</span>';
    a.classList.toggle('active',v===VIEW && v!=='logout');
    a.onclick=e=>{
      e.preventDefault();
      if(v==='logout'){ logoutApp(); return; }
      go(v);
    };
  });
}
function go(view,param){
  if(view==='logout'){ logoutApp(); return; }
  VIEW=view; buildNav();
  const d=NAV.find(n=>n.v===view);
  document.getElementById('eyebrow').textContent = ({dashboard:'Pilotage',quotes:'Documents',invoices:'Documents',clients:'Référentiel',catalog:'Référentiel',company:'Référentiel'})[view]||'';
  document.getElementById('pageTitle').textContent=d.t;
  document.getElementById('pageActions').innerHTML='';
  const c=document.getElementById('content'); c.innerHTML='';
  window.scrollTo(0,0);
  ({dashboard:renderDashboard,quotes:renderQuotes,invoices:renderInvoices,clients:renderClients,catalog:renderCatalog,company:renderCompany})[view](c,param);
}

function invoiceStatus(inv){
  if(inv.paid) return {k:'payée',cls:'b-green'};
  if(inv.status==='brouillon') return {k:'brouillon',cls:'b-grey'};
  if(inv.dueDate && inv.dueDate<todayISO()) return {k:'en retard',cls:'b-red'};
  return {k:'envoyée',cls:'b-blue'};
}
function quoteStatus(q){
  const m={brouillon:'b-grey','envoyé':'b-blue','accepté':'b-green','refusé':'b-red'};
  return {k:q.status||'brouillon',cls:m[q.status]||'b-grey'};
}

function renderDashboard(c){
  const invBilled=S.invoices.filter(i=>i.status!=='brouillon').reduce((a,i)=>a+docTotals(i).total,0);
  const unpaid=S.invoices.filter(i=>!i.paid && i.status!=='brouillon').reduce((a,i)=>a+docTotals(i).total,0);
  const unpaidN=S.invoices.filter(i=>!i.paid && i.status!=='brouillon').length;
  const pendingQ=S.quotes.filter(q=>q.status==='envoyé').length;
  const stats=[
    {k:'Chiffre d’affaires facturé',v:fmt(invBilled),sub:S.invoices.length+' facture(s)'},
    {k:'En attente de paiement',v:fmt(unpaid),sub:unpaidN+' facture(s) impayée(s)'},
    {k:'Devis en attente',v:pendingQ,sub:'sur '+S.quotes.length+' devis'},
    {k:'Clients',v:S.clients.length,sub:'au référentiel'},
  ];
  document.getElementById('pageActions').innerHTML=
    '<button class="btn" id="qaDevis">'+I.quote+'Nouveau devis</button>'+
    '<button class="btn primary" id="qaFact">'+I.plus+'Nouvelle facture</button>';

  const recentInv=[...S.invoices].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).slice(0,5);

  html+='<div class="section-title"><h2>Derniers devis</h2><a href="#" id="allQ">Tout voir</a></div>';
  html+=recentQ.length?docTable(recentQ,'quote'):emptyBlock(I.quote,'Aucun devis','Créez un devis et convertissez-le en facture en un clic.');
  c.innerHTML=html;
  document.getElementById('allInv').onclick=e=>{e.preventDefault();go('invoices');};
  document.getElementById('allQ').onclick=e=>{e.preventDefault();go('quotes');};

}
function emptyBlock(icon,title,sub){ return '<div class="card empty">'+icon+'<h3>'+title+'</h3><div>'+sub+'</div></div>'; }

/* ---------- Table devis/factures ---------- */
function docTable(list,type){
  let h='<div class="card"><table><thead><tr><th>N°</th><th>Client</th><th>Date</th><th>Statut</th><th class="t-right">Montant</th><th></th></tr></thead><tbody>';
  list.forEach(d=>{
    const cl=clientById(d.clientId);
    const st=type==='invoice'?invoiceStatus(d):quoteStatus(d);
    const tot=docTotals(d).total;
    h+='<tr data-id="'+d.id+'" data-type="'+type+'">'+
      '<td><span class="doc-no">'+esc(d.number||'—')+'</span></td>'+
      '<td><div class="cell-strong">'+esc(cl?cl.name:'—')+'</div></td>'+
      '<td>'+fmtDate(d.date)+'</td>'+
      '<td><span class="badge '+st.cls+'">'+st.k+'</span></td>'+
      '<td class="t-right tnum cell-strong">'+fmt(tot)+'</td>'+
      '<td><div class="rowActions">'+
        '<button class="iconbtn act-edit" title="Ouvrir">'+I.edit+'</button>'+
        '<button class="iconbtn act-print" title="Imprimer / PDF">'+I.print+'</button>'+
        (type==='quote'?'<button class="iconbtn act-toinv" title="Transformer en facture">'+I.toInv+'</button>':'')+
        '<button class="iconbtn act-dup" title="Dupliquer">'+I.copy+'</button>'+
        '<button class="iconbtn danger act-del" title="Supprimer">'+I.trash+'</button>'+
      '</div></td></tr>';
  });
  h+='</tbody></table></div>';
  return h;
}
function wireDocTable(scope){
  scope.querySelectorAll('tr[data-id]').forEach(tr=>{
    const id=tr.dataset.id, type=tr.dataset.type, q=sel=>tr.querySelector(sel);
    if(q('.act-edit')) q('.act-edit').onclick=()=>openEditor(type,id);
    if(q('.act-print')) q('.act-print').onclick=()=>printDoc(type,id);
    if(q('.act-dup')) q('.act-dup').onclick=()=>duplicateDoc(type,id);
    if(q('.act-del')) q('.act-del').onclick=()=>confirmDelete(type,id);
    if(q('.act-toinv')) q('.act-toinv').onclick=()=>convertToInvoice(id);
    tr.querySelectorAll('td').forEach((td,idx)=>{ if(idx<4){ td.style.cursor='pointer'; td.onclick=()=>openEditor(type,id); } });
  });
}

let draft=null, draftType='quote', draftIsNew=true;
function newNumber(type,n){ const y=new Date().getFullYear(); const pre=type==='quote'?'DEV':'FAC'; return pre+'-'+y+'-'+String(n).padStart(4,'0'); }
function openEditor(type,id){
  draftType=type;
  if(id){
    const src=(type==='quote'?S.quotes:S.invoices).find(d=>d.id===id);
    draft=JSON.parse(JSON.stringify(src)); draftIsNew=false;
  }else{
    draftIsNew=true;
    draft={ id:uid(type), number:null, clientId:S.clients[0]?S.clients[0].id:'', date:todayISO(),
      blocs:[], extraLines:[], autoRemise:S.settings.autoRemise!==false, discount:0, discountType:'eur', notes:'', status:'brouillon' };
    if(type==='quote') draft.validUntil=addDays(todayISO(),S.settings.quoteValidityDays);
    else { draft.dueDate=addDays(todayISO(),S.settings.invoiceDueDays); draft.paid=false; draft.paidDate=''; draft.serviceDate=todayISO(); }
  }
  if(!draft.blocs) draft.blocs=[];
  if(!draft.extraLines) draft.extraLines=[];
  VIEW='editor'; buildNav();
  document.getElementById('eyebrow').textContent = type==='quote'?'Devis':'Facture';
  document.getElementById('pageTitle').textContent = (draftIsNew?'Nouveau ':'')+(type==='quote'?'devis':'facture')+(draft.number?' · '+draft.number:'');
  document.getElementById('pageActions').innerHTML=
    '<button class="btn" id="edBack">'+I.back+'Retour</button>'+
    '<button class="btn" id="edPrint">'+I.print+'Imprimer</button>'+
    '<button class="btn primary" id="edSave">'+I.save+'Enregistrer</button>';
  document.getElementById('edBack').onclick=()=>go(type==='quote'?'quotes':'invoices');
  document.getElementById('edSave').onclick=()=>saveDraft();
  document.getElementById('edPrint').onclick=()=>{ if(saveDraft(true)) printDoc(type,draft.id); };
  renderEditor();
}
function renderEditor(){
  const c=document.getElementById('content'), type=draftType;
  const clientOpts=S.clients.map(cl=>'<option value="'+cl.id+'"'+(cl.id===draft.clientId?' selected':'')+'>'+esc(cl.name)+'</option>').join('');
  let form='<div class="card panel"><h3>Informations</h3><div class="form-grid">';
  form+='<div class="field full"><label>Client</label><div class="hstack" style="flex-wrap:nowrap">'+
        '<select id="f_client" style="flex:1">'+(clientOpts||'<option value="">— aucun client —</option>')+'</select>'+
        '<button class="btn sm" id="f_newclient" style="flex:none">'+I.plus+'Nouveau</button></div></div>';
  form+='<div class="field"><label>Date</label><input type="date" id="f_date" value="'+esc(draft.date)+'"></div>';
  if(type==='quote'){
    form+='<div class="field"><label>Valable jusqu’au</label><input type="date" id="f_valid" value="'+esc(draft.validUntil||'')+'"></div>';
    form+='<div class="field full"><label>Statut</label><select id="f_status">'+['brouillon','envoyé','accepté','refusé'].map(s=>'<option'+(draft.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div>';
  }else{
    form+='<div class="field"><label>Échéance</label><input type="date" id="f_due" value="'+esc(draft.dueDate||'')+'"></div>';
    form+='<div class="field"><label>Date de la prestation</label><input type="date" id="f_service" value="'+esc(draft.serviceDate||'')+'"></div>';
    form+='<div class="field"><label>Statut</label><select id="f_status">'+['brouillon','envoyée'].map(s=>'<option'+(draft.status===s?' selected':'')+'>'+s+'</option>').join('')+'</select></div>';
    form+='<div class="field"><label>Règlement</label><label class="hstack" style="font-weight:500;margin-top:6px"><input type="checkbox" id="f_paid" '+(draft.paid?'checked':'')+' style="width:auto"> Facture payée</label>'+
          '<input type="date" id="f_paiddate" value="'+esc(draft.paidDate||'')+'" '+(draft.paid?'':'disabled')+' style="margin-top:6px"></div>';
  }
  form+='</div>';

  /* Prestations en blocs */
  form+='<h3 style="margin-top:22px">Prestations</h3>';
  form+='<div class="blocs" id="blocs"></div>';
  form+='<div class="svcpick"><select id="svcAdd"><option value="">+ Ajouter une prestation principale…</option></select></div>';
  form+='<div class="addline"><button class="btn sm" id="addFree">'+I.plus+'Ligne libre</button></div>';
  form+='<div id="extraWrap"></div>';

  /* Remises + total */
  form+='<div class="totbox">';
  form+='<label class="hstack mb0" style="font-weight:500"><input type="checkbox" id="f_autorem" '+(draft.autoRemise!==false?'checked':'')+' style="width:auto"> Remise automatique multi-services (−5 % dès 2, −10 % dès 3)</label>';
  form+='<div class="totrow" style="margin-top:8px"><span>Remise supplémentaire</span><span class="hstack"><input type="number" id="f_disc" value="'+(draft.discount||0)+'" step="0.01" style="width:90px;text-align:right;font-family:var(--display)"><select id="f_disctype" style="width:auto"><option value="eur"'+(draft.discountType==='eur'?' selected':'')+'>€</option><option value="pct"'+(draft.discountType==='pct'?' selected':'')+'>%</option></select></span></div>';
  form+='<div id="totlines"></div></div>';

  form+='<div class="field full mt16"><label>Notes / conditions particulières <span class="hint">(optionnel)</span></label><textarea id="f_notes" placeholder="Ex : acompte de 30 % à la commande, délai de livraison…">'+esc(draft.notes||'')+'</textarea></div>';
  form+='</div>';

  c.innerHTML='<div class="editor"><div>'+form+'</div><div class="sheetwrap"><div id="doc-preview"></div></div></div>';

  const bind=(elid,key)=>{ const el=document.getElementById(elid); if(el) el.oninput=el.onchange=()=>{ draft[key]=el.value; refreshCompute(); }; };
  bind('f_client','clientId'); bind('f_date','date');
  if(type==='quote'){ bind('f_valid','validUntil'); bind('f_status','status'); }
  else{
    bind('f_due','dueDate'); bind('f_service','serviceDate'); bind('f_status','status');
    const paid=document.getElementById('f_paid'), pd=document.getElementById('f_paiddate');
    paid.onchange=()=>{ draft.paid=paid.checked; pd.disabled=!paid.checked; if(paid.checked&&!draft.paidDate){draft.paidDate=todayISO();pd.value=draft.paidDate;} refreshCompute(); };
    pd.onchange=()=>{ draft.paidDate=pd.value; refreshCompute(); };
  }
  document.getElementById('f_autorem').onchange=e=>{ draft.autoRemise=e.target.checked; refreshCompute(); };
  document.getElementById('f_disc').oninput=e=>{ draft.discount=parseFloat(e.target.value)||0; refreshCompute(); };
  document.getElementById('f_disctype').onchange=e=>{ draft.discountType=e.target.value; refreshCompute(); };
  document.getElementById('f_notes').oninput=e=>{ draft.notes=e.target.value; refreshCompute(); };
  document.getElementById('f_newclient').onclick=()=>openClientModal(null,(id)=>{ draft.clientId=id; renderEditor(); });
  document.getElementById('svcAdd').onchange=e=>{ if(e.target.value){ addBloc(e.target.value); e.target.value=''; } };
  document.getElementById('addFree').onclick=()=>{ draft.extraLines.push({name:'',description:'',qty:1,unit:'forfait',price:0}); renderExtra(); refreshCompute(); };

  renderBlocs(); renderSvcAdd(); renderExtra(); renderTotals(); refreshPreview();
}
function renderSvcAdd(){
  const sel=document.getElementById('svcAdd'); if(!sel)return;
  const used=new Set((draft.blocs||[]).map(b=>b.svcId));
  const opts=S.services.filter(s=>!used.has(s.id)).map(s=>'<option value="'+s.id+'">'+esc(s.nom)+' — dès '+fmt(s.base)+(s.mensuel?'/mois':'')+'</option>').join('');
  sel.innerHTML='<option value="">+ Ajouter une prestation principale…</option>'+opts;
  sel.style.display = opts?'':'none';
}
function addBloc(svcId){
  const s=svcById(svcId); if(!s)return;
  const bloc={svcId, opts:{}};
  if(s.select) bloc.sel=0;
  if(s.qty) bloc.qty=s.qty.def;
  if(s.km) bloc.km=0;
  draft.blocs.push(bloc);
  renderBlocs(); renderSvcAdd(); renderTotals(); refreshPreview();
}
function blocTotal(b){
  const s=svcById(b.svcId); if(!s) return 0;
  let coef=1; if(s.select){ const i=Math.min(s.select.opts.length-1,Math.max(0,b.sel||0)); coef=s.select.opts[i].coef; }
  let qty=1; if(s.qty){ qty=Math.min(s.qty.max,Math.max(s.qty.min,parseInt(b.qty)||s.qty.def)); }
  let t=Math.round(s.base*coef)*qty;
  (s.options||[]).forEach(o=>{ if(b.opts&&b.opts[o.id]) t+=o.prix*(o.parQty?qty:1); });
  if(s.km){ const km=Math.min(2000,Math.max(0,parseInt(b.km)||0)); t+=Math.round(km*(Number(S.settings.pricePerKm)||0)); }
  return t;
}
function renderBlocs(){
  const box=document.getElementById('blocs'); if(!box)return;
  if(!draft.blocs.length){ box.innerHTML='<div style="color:var(--muted);font-size:13px;padding:6px 2px">Aucune prestation. Choisissez une prestation principale ci-dessous, puis cochez ses options.</div>'; return; }
  box.innerHTML=draft.blocs.map((b,i)=>{
    const s=svcById(b.svcId); if(!s) return '';
    let body='';
    if(s.select){
      body+='<div class="ctrl-row"><label>'+esc(s.select.label)+'</label><select class="b-sel" data-i="'+i+'">'+
        s.select.opts.map((o,oi)=>'<option value="'+oi+'"'+((b.sel||0)===oi?' selected':'')+'>'+esc(o.label)+'</option>').join('')+'</select></div>';
    }
    if(s.qty){
      body+='<div class="ctrl-row"><label>'+esc(s.qty.label)+'</label><input type="number" class="num b-qty" data-i="'+i+'" min="'+s.qty.min+'" max="'+s.qty.max+'" value="'+(b.qty||s.qty.def)+'"></div>';
    }
    if(s.km){
      body+='<div class="ctrl-row"><label>Déplacement (km aller-retour)</label><input type="number" class="num b-km" data-i="'+i+'" min="0" max="2000" step="5" value="'+(b.km||0)+'"></div>';
    }
    if(s.options&&s.options.length){
      body+='<div class="opt-list">'+s.options.map(o=>{
        const on=b.opts&&b.opts[o.id];
        return '<label class="opt-item'+(on?' on':'')+'" data-i="'+i+'" data-opt="'+o.id+'"><span class="oc"><input type="checkbox" '+(on?'checked':'')+'> <span>'+esc(o.label)+'</span></span>'+
          '<span class="op">+ '+fmt(o.prix)+(o.parQty?' / support':'')+(s.mensuel?' / mois':'')+'</span></label>';
      }).join('')+'</div>';
    }
    return '<div class="bloc"><div class="bloc-head"><span class="dot" style="background:'+s.couleur+'"></span>'+
      '<span class="bn">'+esc(s.nom)+'<small>dès '+fmt(s.base)+(s.mensuel?' / mois':'')+'</small></span>'+
      '<span class="bprice" data-i="'+i+'">'+fmt(blocTotal(b))+'</span>'+
      '<button class="iconbtn danger b-rm" data-i="'+i+'" title="Retirer">'+I.trash+'</button></div>'+
      '<div class="bloc-body">'+body+'</div></div>';
  }).join('');
  box.querySelectorAll('.b-sel').forEach(el=>el.onchange=()=>{ draft.blocs[+el.dataset.i].sel=parseInt(el.value)||0; afterBlocChange(); });
  box.querySelectorAll('.b-qty').forEach(el=>el.oninput=()=>{ draft.blocs[+el.dataset.i].qty=parseInt(el.value)||1; afterBlocChange(); });
  box.querySelectorAll('.b-km').forEach(el=>el.oninput=()=>{ draft.blocs[+el.dataset.i].km=parseInt(el.value)||0; afterBlocChange(); });
  box.querySelectorAll('.opt-item').forEach(el=>{
    const cb=el.querySelector('input');
    cb.onchange=()=>{ const i=+el.dataset.i, oid=el.dataset.opt; if(!draft.blocs[i].opts)draft.blocs[i].opts={};
      if(cb.checked) draft.blocs[i].opts[oid]=true; else delete draft.blocs[i].opts[oid];
      el.classList.toggle('on',cb.checked); afterBlocChange(); };
  });
  box.querySelectorAll('.b-rm').forEach(el=>el.onclick=()=>{ draft.blocs.splice(+el.dataset.i,1); renderBlocs(); renderSvcAdd(); renderTotals(); refreshPreview(); });
}
function afterBlocChange(){
  // met à jour les sous-totaux de blocs sans reconstruire les inputs (garde le focus)
  document.querySelectorAll('#blocs .bprice').forEach(el=>{ const i=+el.dataset.i; if(draft.blocs[i]) el.textContent=fmt(blocTotal(draft.blocs[i])); });
  renderTotals(); refreshPreview();
}
function renderExtra(){
  const w=document.getElementById('extraWrap'); if(!w)return;
  if(!draft.extraLines.length){ w.innerHTML=''; return; }
  let h='<table class="lineTable" style="margin-top:12px"><thead><tr><th>Ligne libre</th><th style="width:60px">Qté</th><th style="width:120px;text-align:right">Prix unit.</th><th style="width:30px"></th></tr></thead><tbody>';
  h+=draft.extraLines.map((l,i)=>'<tr data-i="'+i+'">'+
    '<td class="lt-desc"><input type="text" class="e-name" value="'+esc(l.name)+'" placeholder="Désignation"></td>'+
    '<td class="lt-num"><input type="number" class="e-qty" value="'+(l.qty)+'" step="0.5" min="0"></td>'+
    '<td class="lt-num"><input type="number" class="e-price" value="'+(l.price)+'" step="0.01" min="0"></td>'+

    tr.querySelector('.e-name').oninput=e=>{ draft.extraLines[i].name=e.target.value; refreshPreview(); };
    tr.querySelector('.e-qty').oninput=e=>{ draft.extraLines[i].qty=parseFloat(e.target.value)||0; renderTotals(); refreshPreview(); };
    tr.querySelector('.e-price').oninput=e=>{ draft.extraLines[i].price=parseFloat(e.target.value)||0; renderTotals(); refreshPreview(); };
    tr.querySelector('.e-rm').onclick=()=>{ draft.extraLines.splice(i,1); renderExtra(); renderTotals(); refreshPreview(); };
  });
}
function renderTotals(){
  const el=document.getElementById('totlines'); if(!el)return;
  const c=computeDoc(draft);
  let h='<div class="totrow" style="margin-top:8px"><span>Sous-total</span><span class="tnum">'+fmt(c.sub)+'</span></div>';
  if(c.remiseAuto>0) h+='<div class="totrow"><span>Remise multi-services (−'+Math.round(c.remisePct*100)+' %)</span><span class="tnum" style="color:var(--warn)">− '+fmt(c.remiseAuto)+'</span></div>';
  if(c.manualRem>0) h+='<div class="totrow"><span>Remise supplémentaire</span><span class="tnum" style="color:var(--warn)">− '+fmt(c.manualRem)+'</span></div>';

  h+='<div style="font-size:11px;color:var(--muted);text-align:right">TVA non applicable, art. 293 B du CGI</div>';

}
function refreshPreview(){ const p=document.getElementById('doc-preview'); if(p) p.innerHTML=docHTML(draft,draftType); }
function refreshCompute(){ renderTotals(); refreshPreview(); }
function saveDraft(silent){
  if(!draft.clientId){ toast('Choisissez un client avant d’enregistrer.'); if(!silent) return false; }
  const store=draftType==='quote'?S.quotes:S.invoices;
  if(draftIsNew){
    S.counters[draftType]=(S.counters[draftType]||0)+1;
    draft.number=newNumber(draftType,S.counters[draftType]);
    store.push(draft); draftIsNew=false;
  }else{
    const idx=store.findIndex(d=>d.id===draft.id);
    if(idx>=0) store[idx]=JSON.parse(JSON.stringify(draft));
  }
  save();
  if(!silent){ toast((draftType==='quote'?'Devis':'Facture')+' enregistré'+(draftType==='quote'?'':'e')+' · '+draft.number); }
  document.getElementById('pageTitle').textContent=(draftType==='quote'?'Devis':'Facture')+' · '+draft.number;
  return true;
}
function convertToInvoice(quoteId){
  const q=S.quotes.find(x=>x.id===quoteId); if(!q)return;
  openModal(
    '<div class="modal-head"><h3>Transformer en facture</h3><button class="iconbtn" onclick="closeModal()">'+I.x+'</button></div>'+
    '<div class="modal-body"><p style="margin:0 0 6px">Créer une facture à partir du devis <b>'+esc(q.number)+'</b> ?</p>'+
    '<p style="color:var(--muted);margin:0">Le devis sera marqué « accepté ». La facture reprendra le client et les prestations, avec un nouveau numéro.</p></div>'+
    '<div class="modal-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn primary" id="doConv">Créer la facture</button></div>'
  );
  document.getElementById('doConv').onclick=()=>{
    S.counters.invoice=(S.counters.invoice||0)+1;
    const inv={ id:uid('invoice'), number:newNumber('invoice',S.counters.invoice),
      clientId:q.clientId, date:todayISO(), serviceDate:q.date, dueDate:addDays(todayISO(),S.settings.invoiceDueDays),
      blocs:JSON.parse(JSON.stringify(q.blocs||[])), extraLines:JSON.parse(JSON.stringify(q.extraLines||[])),
      autoRemise:q.autoRemise, discount:q.discount, discountType:q.discountType,
      notes:q.notes, status:'envoyée', paid:false, paidDate:'', fromQuote:q.number };
    S.invoices.push(inv); q.status='accepté'; save(); closeModal();
    toast('Facture '+inv.number+' créée'); openEditor('invoice',inv.id);
  };
}
function duplicateDoc(type,id){
  const store=type==='quote'?S.quotes:S.invoices;
  const src=store.find(d=>d.id===id); if(!src)return;
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=uid(type); copy.date=todayISO(); copy.status='brouillon'; copy.paid=false; copy.paidDate=''; copy.fromQuote=undefined;
  if(type==='quote') copy.validUntil=addDays(todayISO(),S.settings.quoteValidityDays);
  else copy.dueDate=addDays(todayISO(),S.settings.invoiceDueDays);
  S.counters[type]=(S.counters[type]||0)+1;
  copy.number=newNumber(type,S.counters[type]);
  store.push(copy); save(); toast('Copie créée · '+copy.number); go(type==='quote'?'quotes':'invoices');
}
function confirmDelete(type,id){
  const store=type==='quote'?S.quotes:S.invoices, d=store.find(x=>x.id===id); if(!d)return;
  openModal(
    '<div class="modal-head"><h3>Supprimer '+(type==='quote'?'le devis':'la facture')+' ?</h3><button class="iconbtn" onclick="closeModal()">'+I.x+'</button></div>'+
    '<div class="modal-body"><p style="margin:0">Le document <b>'+esc(d.number)+'</b> sera définitivement supprimé. Cette action est irréversible.</p>'+
    (type==='invoice'?'<p style="color:var(--warn);font-size:12.5px;margin:10px 0 0">La numérotation des factures doit rester continue. Ne supprimez une facture que si elle n’a pas été transmise.</p>':'')+'</div>'+
    '<div class="modal-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn danger" id="doDel">Supprimer</button></div>'
  );
  document.getElementById('doDel').onclick=()=>{ store.splice(store.findIndex(x=>x.id===id),1); save(); closeModal(); toast('Supprimé'); go(type==='quote'?'quotes':'invoices'); };
}

/* ---------- Rendu du document (feuille imprimable) ---------- */
function docHTML(doc,type){
  const co=S.company, cl=clientById(doc.clientId), c=computeDoc(doc), isQ=type==='quote';
  const coLines=[co.address,[co.zip,co.city].filter(Boolean).join(' '),co.siret?('SIRET '+co.siret):'',co.email,co.phone].filter(Boolean);
  const clLines= cl?[cl.contact,cl.address,[cl.zip,cl.city].filter(Boolean).join(' '),cl.siret?('SIRET '+cl.siret):'',cl.email].filter(Boolean):[];
  let rows=c.lines.map(l=>
    '<tr><td><div class="d-name">'+esc(l.name||'—')+'</div>'+(l.description?'<div class="d-desc">'+nl2br(l.description)+'</div>':'')+'</td>'+
    '<td class="r">'+esc(l.qty)+(l.unit?' '+esc(l.unit):'')+'</td>'+
    '<td class="r">'+fmt(l.price)+'</td>'+
    '<td class="r">'+fmt(l.total)+'</td></tr>').join('');
  if(!rows) rows='<tr><td colspan="4" style="color:#9aa;padding:16px">—</td></tr>';
  let dateBox='';
  if(isQ){ dateBox='<div><b>Date</b> · '+fmtDate(doc.date)+'</div>'+(doc.validUntil?'<div><b>Valable jusqu’au</b> · '+fmtDate(doc.validUntil)+'</div>':''); }
  else{
    dateBox='<div><b>Date d’émission</b> · '+fmtDate(doc.date)+'</div>'+
      (doc.serviceDate?'<div><b>Prestation</b> · '+fmtDate(doc.serviceDate)+'</div>':'')+
      (doc.dueDate?'<div><b>Échéance</b> · '+fmtDate(doc.dueDate)+'</div>':'')+
      (doc.paid?'<div style="color:#0E7A5A"><b>Payée</b> · '+fmtDate(doc.paidDate)+'</div>':'')+
      (doc.fromQuote?'<div style="color:#8A8F9C">Réf. devis '+esc(doc.fromQuote)+'</div>':'');
  }
  let h='<div class="sheet">';
  h+='<div class="doc-top"><div>'+
      (co.logo?'<img class="logo" src="'+co.logo+'" alt="logo"><div style="height:8px"></div>':'')+
      '<div class="wordmark">'+wordmarkHTML(co.name)+'</div>'+(co.tagline?'<div class="co-tag">'+esc(co.tagline)+'</div>':'')+
      '<div class="co-lines">'+coLines.map(esc).join('<br>')+'</div></div>'+
      '<div class="doc-title"><div class="dt">'+(isQ?'Devis':'Facture')+'</div><div class="dn">'+esc(doc.number||'(brouillon)')+'</div></div></div>';
  h+='<div class="meta"><div class="party"><div class="plbl">'+(isQ?'Devis pour':'Facturé à')+'</div>'+
      '<div class="pname">'+esc(cl?cl.name:'— client non renseigné —')+'</div>'+
      (clLines.length?'<div class="plines">'+clLines.map(esc).join('<br>')+'</div>':'')+'</div>'+
      '<div class="datebox">'+dateBox+'</div></div>';
  h+='<table class="doc-items"><thead><tr><th>Désignation</th><th class="r">Qté</th><th class="r">Prix unit.</th><th class="r">Montant</th></tr></thead><tbody>'+rows+'</tbody></table>';
  h+='<div class="sums"><div class="sbox">'+
      '<div class="srow"><span>Sous-total</span><span class="tnum">'+fmt(c.sub)+'</span></div>'+
      (c.remiseAuto>0?'<div class="srow"><span>Remise multi-services (−'+Math.round(c.remisePct*100)+' %)</span><span class="tnum">− '+fmt(c.remiseAuto)+'</span></div>':'')+
      (c.manualRem>0?'<div class="srow"><span>Remise supplémentaire</span><span class="tnum">− '+fmt(c.manualRem)+'</span></div>':'')+
      (c.travel>0?'<div class="srow"><span>Frais de déplacement</span><span class="tnum">+ '+fmt(c.travel)+'</span></div>':'')+
      '<div class="stotal"><span>'+(isQ?'Total estimé':'Net à payer')+'</span><span class="tnum">'+fmt(c.total)+'</span></div>'+
      (c.monthly>0?'<div class="srow" style="color:var(--muted);font-size:11px;margin-top:4px"><span>dont abonnement mensuel</span><span class="tnum">'+fmt(c.monthly)+' / mois</span></div>':'')+
      '</div></div>';
  h+='<div class="tva-note">'+esc(co.legalMention||'TVA non applicable, article 293 B du CGI.')+'</div>';
  if(doc.notes) h+='<div class="notes"><b>Notes :</b> '+nl2br(doc.notes)+'</div>';
  if(isQ) h+='<div class="signbox"><div class="sb"><b>Bon pour accord</b>Date et signature du client :</div></div>';
  let legal=[];
  if(isQ && co.quoteFooter) legal.push(co.quoteFooter);
  if(!isQ){ if(co.paymentTerms) legal.push(co.paymentTerms); if(co.latePenalty) legal.push(co.latePenalty); }
  if(!isQ && (co.iban||co.bic)) legal.push('Coordonnées bancaires : '+[co.iban?('IBAN '+co.iban):'',co.bic?('BIC '+co.bic):''].filter(Boolean).join(' · '));
  if(legal.length) h+='<div class="legal">'+legal.map(esc).join('<br>')+'</div>';
  h+='<div class="foot">'+esc(co.name)+(co.siret?' · SIRET '+esc(co.siret):'')+(co.website?' · '+esc(co.website):'')+'</div>';
  h+='</div>';
  return h;
}
function printDoc(type,id){
  const store=type==='quote'?S.quotes:S.invoices;
  const doc=store.find(d=>d.id===id)||(draft&&draft.id===id?draft:null); if(!doc)return;
  document.getElementById('print-root').innerHTML=docHTML(doc,type);
  setTimeout(()=>window.print(),60);
}

      '<div class="field full"><label>Accroche</label><input type="text" id="co_tag" value="'+esc(co.tagline)+'"></div>'+
      '<div class="field full"><label>Adresse</label><input type="text" id="co_address" value="'+esc(co.address)+'"></div>'+
      F('co_zip','Code postal',co.zip)+F('co_city','Ville',co.city)+
      F('co_siret','SIRET',co.siret,'','obligatoire sur factures')+F('co_ape','Code APE',co.ape)+
      F('co_email','Email',co.email)+F('co_phone','Téléphone',co.phone)+
      '<div class="field full"><label>Site web</label><input type="text" id="co_web" value="'+esc(co.website)+'"></div>'+
      F('co_iban','IBAN',co.iban)+F('co_bic','BIC',co.bic)+
    '</div></div>';
  h+='<div class="card panel"><h3>Mentions légales & conditions</h3>'+
      T('co_legal','Mention TVA',co.legalMention)+
      T('co_pay','Conditions de règlement (factures)',co.paymentTerms)+
      T('co_late','Pénalités de retard (factures)',co.latePenalty)+
      T('co_qf','Mention de bas de devis',co.quoteFooter)+
      '<div style="font-size:11.5px;color:var(--muted)">Statut auto-entrepreneur : pas de TVA facturée. La mention « TVA non applicable, art. 293 B du CGI » est obligatoire sur chaque document.</div>'+

      const img=new Image();
      img.onload=()=>{
        const maxW=400, scale=Math.min(1, maxW/img.width);
        const cv=document.createElement('canvas');
        cv.width=Math.round(img.width*scale); cv.height=Math.round(img.height*scale);

    save(); toast('Informations enregistrées');
  };
}

      '<div class="field"><label>Que voulez-vous effacer ?</label>'+
        '<label class="opt-item on" style="cursor:pointer"><span class="oc"><input type="radio" name="rst" value="docs" checked style="width:17px;height:17px;accent-color:var(--orange)"> <span><b>Les devis et factures uniquement</b><br><small style="color:var(--muted)">La numérotation repart à 0001. Clients, prestations et tarifs conservés.</small></span></span></label>'+
        '<label class="opt-item" style="cursor:pointer"><span class="oc"><input type="radio" name="rst" value="all" style="width:17px;height:17px;accent-color:var(--orange)"> <span><b>Tout remettre à zéro</b><br><small style="color:var(--muted)">Documents, clients, tarifs et informations d’entreprise reviennent aux réglages d’origine.</small></span></span></label>'+
      '</div>'+
      '<div style="background:var(--warn-soft);color:var(--warn);border-radius:9px;padding:11px 13px;font-size:12.5px;line-height:1.5;margin-top:6px">'+
        '<b>Action irréversible.</b> Pensez à cliquer sur « Sauvegarder » avant, si vous voulez pouvoir revenir en arrière. À n’utiliser que pour effacer des tests : une facture réellement transmise à un client doit être conservée.'+
      '</div>'+
      '<div class="field mt16"><label>Pour confirmer, tapez <b>EFFACER</b></label><input type="text" id="rstConfirm" placeholder="EFFACER" autocomplete="off"></div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn" onclick="closeModal()">Annuler</button><button class="btn danger" id="doReset" disabled style="opacity:.5">Réinitialiser</button></div>'
  );
  modalEl.querySelectorAll('input[name=rst]').forEach(r=>r.onchange=()=>{
    modalEl.querySelectorAll('.opt-item').forEach(l=>l.classList.toggle('on', l.querySelector('input').checked));
  });
  const inp=document.getElementById('rstConfirm'), btn=document.getElementById('doReset');
  inp.oninput=()=>{ const ok=inp.value.trim().toUpperCase()==='EFFACER'; btn.disabled=!ok; btn.style.opacity=ok?1:.5; };
  btn.onclick=()=>{
    if(inp.value.trim().toUpperCase()!=='EFFACER') return;
    const mode=modalEl.querySelector('input[name=rst]:checked').value;
    if(mode==='all'){ S=defaultState(); }
    else { S.quotes=[]; S.invoices=[]; S.counters={quote:0,invoice:0}; }
    save(); closeModal(); go('dashboard');
    toast(mode==='all'?'Application remise à zéro':'Devis et factures effacés');
  };
}


/* ---------- Code d'entree ---------- */
const ENTRY_CODE = '195206'; // Changez ce code ici.
const ACCESS_KEY = 'tbsn_access_ok';
function unlockApp(){
  sessionStorage.setItem(ACCESS_KEY,'1');
  document.getElementById('appRoot').classList.remove('locked');
  document.getElementById('accessGate').style.display='none';
  buildNav();
  go('dashboard');
}
function resetAccessForm(){
  const input=document.getElementById('accessCode');
  const error=document.getElementById('accessError');
  if(error) error.textContent='';
  if(input){
    input.value='';
    setTimeout(()=>input.focus(),30);
  }
}
function logoutApp(){
  sessionStorage.removeItem(ACCESS_KEY);
  closeModal();
  VIEW='dashboard';
  document.getElementById('appRoot').classList.add('locked');
  document.getElementById('accessGate').style.display='flex';
  resetAccessForm();
}
function initAccessGate(){
  const form=document.getElementById('accessForm');
  const input=document.getElementById('accessCode');
  const error=document.getElementById('accessError');
  if(sessionStorage.getItem(ACCESS_KEY)==='1'){
    unlockApp();
    return;
  }
  form.addEventListener('submit',e=>{
    e.preventDefault();
    if(input.value.trim()===ENTRY_CODE){ unlockApp(); return; }
    error.textContent='Code incorrect.';
    input.value='';
    input.focus();
  });
}
/* ---------- Init ---------- */
initAccessGate();

</script>

<!-- ═══════════════════════════════════════════════════════════════
     SYNCHRONISATION CLOUD (Firebase) — optionnelle
     Sans configuration, l'application fonctionne exactement comme
     avant : 100 % locale. Voir la marche à suivre dans le README.
     ═══════════════════════════════════════════════════════════════ -->
<script type="module">
/* ─────────────────────────────────────────────────────────────
   1) COLLEZ ICI LA CONFIGURATION DE VOTRE PROJET FIREBASE
   Console Firebase > Paramètres du projet > Vos applications > Web
   Ces valeurs ne sont PAS des secrets : elles peuvent être publiques.
   La sécurité est assurée par la connexion + les règles Firestore.
   ───────────────────────────────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "",
  authDomain:        "",
  projectId:         "",
  storageBucket:     "",
  messagingSenderId: "",
  appId:             ""
};
/* ───────────────────────────────────────────────────────────── */

const A = window.__tbsn;
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const CONFIGURED = !!(firebaseConfig.apiKey && firebaseConfig.projectId);

let fb=null;              // { auth, db, user }
let unsubscribe=null;     // écoute temps réel
let applyingRemote=false; // évite de renvoyer ce qu'on vient de recevoir
let pushTimer=null;
let lastSync=null;
let status='local';       // local | connecting | online | error

/* ---------- Bouton de la barre latérale ---------- */
const btn=document.getElementById('btnSync');
const ICON_CLOUD='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg>';
function paintBtn(){
  const dot = status==='online' ? '<span style="margin-left:auto;width:7px;height:7px;border-radius:50%;background:#4ADE80;flex:none"></span>'
            : status==='error'  ? '<span style="margin-left:auto;width:7px;height:7px;border-radius:50%;background:#F87171;flex:none"></span>'
            : '';
  const label = status==='online' ? 'Synchronisé' : status==='connecting' ? 'Connexion…' : 'Synchroniser';
  btn.innerHTML = ICON_CLOUD + '<span>' + label + '</span>' + dot;
  btn.style.display='flex'; btn.style.alignItems='center';
}
paintBtn();
btn.onclick=openSyncModal;

/* ---------- Démarrage ---------- */
if(CONFIGURED) boot();

async function boot(){
  try{
    status='connecting'; paintBtn();
    const [{ initializeApp }, authMod, fsMod] = await Promise.all([
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js'),
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js'),
      import('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js')
    ]);
    const app  = initializeApp(firebaseConfig);
    const auth = authMod.getAuth(app);
    const db   = fsMod.getFirestore(app);
    fb = { auth, db, authMod, fsMod, user:null };

    // Reste connecté d'une session à l'autre
    await authMod.setPersistence(auth, authMod.browserLocalPersistence);

    authMod.onAuthStateChanged(auth, async (user)=>{
      fb.user = user;
      if(unsubscribe){ unsubscribe(); unsubscribe=null; }
      if(user){ await afterSignIn(); }
      else { status='local'; paintBtn(); }
    });
  }catch(e){
    console.error('Firebase indisponible :', e);
    status='error'; paintBtn();
  }
}

function docRef(){
  const { doc } = fb.fsMod;
  return doc(fb.db, 'users', fb.user.uid, 'app', 'state');
}

/* ---------- Après connexion : fusion initiale ---------- */
async function afterSignIn(){
  const { getDoc } = fb.fsMod;
  status='connecting'; paintBtn();
  let snap;
  try{ snap = await getDoc(docRef()); }
  catch(e){ console.error(e); status='error'; paintBtn(); A.toast('Erreur de lecture cloud.'); return; }

  const local = A.getState();
  const localHasData = (local.quotes?.length || local.invoices?.length || local.clients?.length);

  if(!snap.exists()){
    await pushNow();                 // premier envoi : le cloud est vide
    listen();
    return;
  }
  const remote = snap.data().state;
  const rT = remote?._updatedAt || 0, lT = local?._updatedAt || 0;

  if(!localHasData || rT >= lT){ applyRemote(remote); listen(); return; }

  // Divergence : l'appareil a des données plus récentes que le cloud
  askConflict(remote, local);
}

function askConflict(remote, local){
  const cnt = s => (s.quotes?.length||0)+' devis · '+(s.invoices?.length||0)+' factures · '+(s.clients?.length||0)+' clients';
  const d = t => t? new Date(t).toLocaleString('fr-FR') : 'inconnue';
  A.openModal(
    '<div class="modal-head"><h3>Quelles données garder ?</h3></div>'+
    '<div class="modal-body">'+
      '<p style="margin:0 0 14px;color:var(--muted)">Cet appareil et le cloud contiennent des données différentes. Choisissez la version à conserver — l’autre sera remplacée.</p>'+
      '<label class="opt-item on" style="cursor:pointer"><span class="oc"><input type="radio" name="cf" value="local" checked style="width:17px;height:17px;accent-color:var(--orange)"> <span><b>Cet appareil</b><br><small style="color:var(--muted)">'+esc(cnt(local))+'<br>modifié le '+esc(d(local._updatedAt))+'</small></span></span></label>'+
      '<label class="opt-item" style="cursor:pointer"><span class="oc"><input type="radio" name="cf" value="remote" style="width:17px;height:17px;accent-color:var(--orange)"> <span><b>Le cloud</b><br><small style="color:var(--muted)">'+esc(cnt(remote||{}))+'<br>modifié le '+esc(d(remote?._updatedAt))+'</small></span></span></label>'+
      '<div style="background:var(--warn-soft);color:var(--warn);border-radius:9px;padding:11px 13px;font-size:12.5px;margin-top:10px"><b>Conseil :</b> faites une sauvegarde (bouton « Sauvegarder ») avant de choisir.</div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn primary" id="cfOk">Confirmer</button></div>'
  );
  document.getElementById('cfOk').onclick=async()=>{
    const v=document.querySelector('input[name=cf]:checked').value;
    A.closeModal();
    if(v==='local') await pushNow(); else applyRemote(remote);
    listen();
  };
  document.querySelectorAll('input[name=cf]').forEach(r=>r.onchange=()=>{
    document.querySelectorAll('.opt-item').forEach(l=>l.classList.toggle('on', l.querySelector('input').checked));
  });
}

/* ---------- Écoute temps réel ---------- */
function listen(){
  const { onSnapshot } = fb.fsMod;
  if(unsubscribe) unsubscribe();
  unsubscribe = onSnapshot(docRef(), (snap)=>{
    if(!snap.exists() || snap.metadata.hasPendingWrites) return; // ignore nos propres écritures
    const remote = snap.data().state;
    const local = A.getState();
    if((remote?._updatedAt||0) > (local?._updatedAt||0)){
      applyRemote(remote);
      A.toast('Mise à jour reçue');
    }
  }, (e)=>{ console.error(e); status='error'; paintBtn(); });
  status='online'; lastSync=Date.now(); paintBtn();
}

function applyRemote(remote){
  if(!remote) return;
  applyingRemote=true;
  A.setState(remote);
  A.refresh();
  applyingRemote=false;
  status='online'; lastSync=Date.now(); paintBtn();
}

/* ---------- Envoi (anti-rebond : 1,2 s après la dernière frappe) ---------- */
function onLocalChange(){
  if(!fb || !fb.user || applyingRemote) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushNow, 1200);
}
async function pushNow(){
  if(!fb || !fb.user) return;
  const { setDoc } = fb.fsMod;
  try{
    await setDoc(docRef(), { state: A.getState(), _savedAt: Date.now() });
    status='online'; lastSync=Date.now(); paintBtn();
  }catch(e){
    console.error(e); status='error'; paintBtn();
    A.toast(String(e).includes('longer than') ? 'Données trop volumineuses (logo ?)' : 'Échec de l’envoi au cloud');
  }
}
window.TBSNSync={ onLocalChange, pushNow };

/* ---------- Fenêtre de synchronisation ---------- */
function openSyncModal(){
  if(!CONFIGURED){ return A.openModal(
    '<div class="modal-head"><h3>Synchronisation non configurée</h3><button class="iconbtn" onclick="closeModal()">✕</button></div>'+
    '<div class="modal-body">'+
      '<p style="margin:0 0 10px">Vos données restent pour l’instant <b>sur cet appareil uniquement</b>.</p>'+
      '<p style="color:var(--muted);margin:0 0 14px">Pour retrouver vos devis et factures sur votre téléphone, créez un projet Firebase gratuit, puis collez sa configuration en haut du bloc <code>&lt;script type="module"&gt;</code>, tout en bas du fichier <code>index.html</code>.</p>'+
      '<div style="background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:12.5px;line-height:1.7">'+
        '<b>En attendant :</b> utilisez « Sauvegarder » sur cet appareil, envoyez-vous le fichier, puis « Restaurer » sur l’autre appareil.'+
      '</div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn" onclick="closeModal()">Fermer</button></div>'
  ); }

  if(fb && fb.user){
    const d = lastSync? new Date(lastSync).toLocaleTimeString('fr-FR') : '—';
    A.openModal(
      '<div class="modal-head"><h3>Synchronisation active</h3><button class="iconbtn" onclick="closeModal()">✕</button></div>'+
      '<div class="modal-body">'+
        '<p style="margin:0 0 6px">Connecté en tant que <b>'+esc(fb.user.email)+'</b></p>'+
        '<p style="color:var(--muted);margin:0 0 14px">Dernière synchronisation : '+esc(d)+'</p>'+
        '<div style="background:var(--ok-soft);color:var(--ok);border-radius:9px;padding:11px 13px;font-size:12.5px">Vos devis et factures se mettent à jour automatiquement sur tous vos appareils connectés avec ce compte.</div>'+
      '</div>'+
      '<div class="modal-foot"><button class="btn danger" id="sOut">Se déconnecter</button><button class="btn primary" id="sNow">Envoyer maintenant</button></div>'
    );
    document.getElementById('sNow').onclick=async()=>{ await pushNow(); A.closeModal(); A.toast('Données envoyées'); };
    document.getElementById('sOut').onclick=async()=>{ await fb.authMod.signOut(fb.auth); A.closeModal(); A.toast('Déconnecté — données conservées sur cet appareil'); };
    return;
  }

  A.openModal(
    '<div class="modal-head"><h3>Se connecter</h3><button class="iconbtn" onclick="closeModal()">✕</button></div>'+
    '<div class="modal-body">'+
      '<p style="color:var(--muted);margin:0 0 14px">Utilisez le même compte sur votre ordinateur et votre téléphone pour retrouver vos documents partout.</p>'+
      '<div class="field"><label>Adresse email</label><input type="email" id="sMail" autocomplete="username"></div>'+
      '<div class="field"><label>Mot de passe</label><input type="password" id="sPass" autocomplete="current-password"></div>'+
      '<div id="sErr" style="display:none;background:var(--danger-soft);color:var(--danger);border-radius:9px;padding:10px 12px;font-size:12.5px"></div>'+
    '</div>'+
    '<div class="modal-foot"><button class="btn" id="sUp">Créer un compte</button><button class="btn primary" id="sIn">Se connecter</button></div>'
  );
  const mail=()=>document.getElementById('sMail').value.trim();
  const pass=()=>document.getElementById('sPass').value;
  const err=(m)=>{ const e=document.getElementById('sErr'); e.style.display='block'; e.textContent=m; };
  const human=(e)=>{
    const c=String(e.code||e);
    if(c.includes('invalid-credential')||c.includes('wrong-password')||c.includes('user-not-found')) return 'Email ou mot de passe incorrect.';
    if(c.includes('email-already-in-use')) return 'Ce compte existe déjà — utilisez « Se connecter ».';
    if(c.includes('weak-password')) return 'Mot de passe trop court (6 caractères minimum).';
    if(c.includes('invalid-email')) return 'Adresse email invalide.';
    if(c.includes('network')) return 'Pas de connexion internet.';
    return 'Erreur : '+c;
  };
  document.getElementById('sIn').onclick=async()=>{
    try{ await fb.authMod.signInWithEmailAndPassword(fb.auth, mail(), pass()); A.closeModal(); A.toast('Connecté'); }
    catch(e){ err(human(e)); }
  };
  document.getElementById('sUp').onclick=async()=>{
    try{ await fb.authMod.createUserWithEmailAndPassword(fb.auth, mail(), pass()); A.closeModal(); A.toast('Compte créé'); }
    catch(e){ err(human(e)); }
  };
}
</script>
